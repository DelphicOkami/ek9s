name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test -v ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o ek9s-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o ek9s-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o ek9s-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o ek9s-darwin-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ek9s-linux-amd64
            ek9s-linux-arm64
            ek9s-darwin-amd64
            ek9s-darwin-arm64
